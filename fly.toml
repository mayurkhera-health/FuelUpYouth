# fly.toml — FuelUp Youth Soccer Nutrition Platform
app = 'fuelup-youth'
primary_region = 'sjc'

[build]

[env]
  PORT = '8000'
  DB_PATH = '/data/fuelup.db'

[[mounts]]
  source = 'fuelup_data'
  destination = '/data'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 50
    soft_limit = 40

  [[http_service.checks]]
    grace_period = '15s'
    interval = '30s'
    method = 'GET'
    timeout = '5s'
    path = '/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
