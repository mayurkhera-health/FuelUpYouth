# fly.staging.toml — behavioral testing only, ephemeral DB
app = 'fuelup-youth-staging'
primary_region = 'sjc'

[build]

[env]
  PORT    = '8000'
  DB_PATH = '/tmp/fuelup.db'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type       = 'connections'
    hard_limit = 10
    soft_limit = 8

  [[http_service.checks]]
    grace_period = '15s'
    interval     = '30s'
    method       = 'GET'
    timeout      = '5s'
    path         = '/health'

[[vm]]
  memory   = '512mb'
  cpu_kind = 'shared'
  cpus     = 1
